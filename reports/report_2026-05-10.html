<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--card:#111827;--card2:#1e293b;--border:#1e2d4a;--text:#e2e8f0;--muted:#64748b;--accent:#6366f1;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--blue:#3b82f6;--purple:#8b5cf6}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;direction:rtl}
.container{max-width:1400px;margin:0 auto;padding:20px}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);border:1px solid #1e2d4a;border-radius:16px;padding:32px;margin-bottom:24px;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-50%;right:-20%;width:600px;height:600px;background:radial-gradient(circle,rgba(99,102,241,0.12) 0%,transparent 70%);border-radius:50%;pointer-events:none}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap}
.h1{font-size:1.9rem;font-weight:800;background:linear-gradient(90deg,#818cf8,#a5b4fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{color:var(--muted);margin-top:6px;font-size:0.9rem}
.countdown{text-align:center;background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);border-radius:12px;padding:16px 28px}
.countdown .days{font-size:3rem;font-weight:900;color:#818cf8;line-height:1}
.api-notice{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:8px;padding:10px 16px;color:#fbbf24;font-size:0.78rem;margin-top:16px;text-align:center}
.tabs{display:flex;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:24px;flex-wrap:wrap}
.tab{padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:600;font-size:0.88rem;color:var(--muted);transition:all 0.2s;border:none;background:transparent}
.tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 12px rgba(99,102,241,0.4)}
.tab:hover:not(.active){background:var(--card2);color:var(--text)}
.tab-content{display:none}.tab-content.active{display:block}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;transition:transform 0.2s,box-shadow 0.2s;position:relative;overflow:hidden}
.kpi-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.kpi-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px}
.kpi-card.green::after{background:var(--green)}.kpi-card.yellow::after{background:var(--yellow)}.kpi-card.blue::after{background:var(--blue)}.kpi-card.purple::after{background:var(--purple)}.kpi-card.red::after{background:var(--red)}
.kpi-label{font-size:0.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px}
.kpi-value{font-size:2rem;font-weight:800;line-height:1}
.kpi-delta{margin-top:6px;font-size:0.8rem}
.ring-container{display:flex;gap:24px;justify-content:center;flex-wrap:wrap;margin:20px 0}
.ring-item{text-align:center}
.ring-text{font-size:0.82rem;color:var(--muted);margin-top:8px;font-weight:600}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px}
.chart-title{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:4px}
.chart-sub{font-size:0.78rem;color:var(--muted);margin-bottom:16px}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
@media(max-width:900px){.chart-grid{grid-template-columns:1fr}}
table{width:100%;border-collapse:collapse}
th{padding:10px;text-align:right;font-size:0.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;border-bottom:1px solid var(--border)}
tr:hover td{background:rgba(255,255,255,0.02)}
.sig-3{color:#22c55e;font-weight:700}.sig-2{color:#86efac}.sig-1{color:#fbbf24}.sig-ns{color:var(--muted)}
.collapsible{background:var(--card2);border:1px solid var(--border);border-radius:8px;margin-bottom:10px}
.collapsible-header{padding:14px 18px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:0.9rem;user-select:none}
.collapsible-header:hover{background:rgba(255,255,255,0.03);border-radius:8px}
.collapsible-body{padding:0 18px 16px;display:none}
.collapsible-body.open{display:block}
.chevron{transition:transform 0.2s;font-style:normal;display:inline-block}
.chevron.open{transform:rotate(180deg)}
.phase{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.phase-title{font-size:1rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.check-item{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;cursor:pointer}
.check-item input[type=checkbox]{width:16px;height:16px;margin-top:2px;accent-color:var(--accent);flex-shrink:0}
.check-label{font-size:0.85rem;color:#cbd5e1;line-height:1.4}
.srs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
@media(max-width:800px){.srs-grid{grid-template-columns:1fr 1fr}}
.srs-stat{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.srs-val{font-size:1.8rem;font-weight:800}.srs-lbl{color:var(--muted);font-size:0.78rem;margin-top:4px}
.new-analysis-box{background:linear-gradient(135deg,rgba(139,92,246,0.15),rgba(99,102,241,0.1));border:1px solid rgba(139,92,246,0.35);border-radius:12px;padding:24px;margin-bottom:20px}
.new-badge{display:inline-block;background:#7c3aed;color:#fff;font-size:0.7rem;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.05em}
.fg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
@media(max-width:600px){.fg-grid{grid-template-columns:1fr}}
.fg-card{background:rgba(0,0,0,0.3);border:1px solid rgba(139,92,246,0.2);border-radius:8px;padding:14px;text-align:center}
.fg-val{font-size:1.6rem;font-weight:800;color:#a78bfa}.fg-lbl{font-size:0.75rem;color:var(--muted);margin-top:4px}
.stat-mini-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px}
.stat-mini{background:rgba(0,0,0,0.3);border-radius:8px;padding:10px 14px}
.stat-mini .k{color:var(--muted);font-size:0.75rem}.stat-mini .v{font-weight:700;font-size:1rem;margin-top:2px}
.section-title{font-size:1.1rem;font-weight:800;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pill{padding:3px 10px;border-radius:20px;font-size:0.72rem;font-weight:700}
.pill-green{background:rgba(34,197,94,0.2);color:#4ade80;border:1px solid rgba(34,197,94,0.3)}
.footer{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:28px;color:var(--muted);font-size:0.78rem;line-height:1.8}
.footer h4{color:var(--text);margin-bottom:10px;font-size:0.88rem}
</style>
</head>

<script>

}
Chart.defaults.color = '#94a3b8';

const DATES = ["2026-03-08","2026-03-15","2026-03-22","2026-03-29","2026-04-05","2026-04-12","2026-04-19","2026-04-26","2026-05-03","2026-05-10"];

}

function drawForgetting(canvasId) {
  const t = Array.from({length:90},(_,i)=>i);
  const fc = t.map(tt => parseFloat((100*Math.exp(-tt/STAB)).toFixed(2)));
  new Chart(document.getElementById(canvasId), {
    type:'line', data:{labels:t,datasets:[
      {label:'שימור זיכרון (%)',data:fc,borderColor:'#a78bfa',backgroundColor:'rgba(139,92,246,0.1)',fill:true,tension:0,pointRadius:0,borderWidth:2.5},
      {label:'יום הבחינה (t=37)',data:t.map(tt=>tt===37?fc[37]:null),borderColor:'#f87171',pointRadius:10,pointStyle:'star',showLine:false}
    ]},
    options:{responsive:true,plugins:{legend:{labels:{boxWidth:12,font:{size:11}}},tooltip:{callbacks:{label:ctx=>` ${ctx.raw?.toFixed(1)}%`}}},
      scales:{x:{title:{display:true,text:'ימים מאז למידה',color:'#64748b'},grid:{color:gridColor}},y:{title:{display:true,text:'שימור (%)',color:'#64748b'},min:0,max:100,grid:{color:gridColor}}}}
  });
}
